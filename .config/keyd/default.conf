0001:0001:09b4e68d

[main]

# Maps capslock to escape when pressed and control when held.
capslock = overload(control, esc)

# Remaps the escape key to capslock
esc = capslock

# Remaps the print screen to right meta
sysrq = rightmeta
leftmeta = sysrq

# Remap the home row keys using overload
d = overloadi(d, timeout(overloadt2(control, d, 80), 500, d), 125)
f = overloadi(f, timeout(overloadt2(shift, f, 80), 500, f), 125)

j = overloadi(j, timeout(overloadt2(shift, j, 80), 500, j), 125)
k = overloadi(k, timeout(overloadt2(control, k, 80), 500, k), 125)
